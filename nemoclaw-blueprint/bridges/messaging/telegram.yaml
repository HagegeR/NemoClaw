bridge:
  name: telegram
  type: messaging
  adapter: telegram
  description: "Telegram Bot API bridge"

  credentials:
    token_env: TELEGRAM_BOT_TOKEN
    allowed_env: ALLOWED_CHAT_IDS

  messaging:
    session_prefix: tg
    max_chunk_size: 4000

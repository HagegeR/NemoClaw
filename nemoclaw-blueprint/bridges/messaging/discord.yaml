bridge:
  name: discord
  type: messaging
  adapter: discord
  description: "Discord bot bridge"

  credentials:
    token_env: DISCORD_BOT_TOKEN
    allowed_env: ALLOWED_CHANNEL_IDS

  messaging:
    session_prefix: dc
    max_chunk_size: 1900

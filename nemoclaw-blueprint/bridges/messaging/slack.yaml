bridge:
  name: slack
  type: messaging
  adapter: slack
  description: "Slack bot bridge (Socket Mode)"

  credentials:
    token_env: SLACK_BOT_TOKEN
    extra_env:
      - SLACK_APP_TOKEN
    allowed_env: ALLOWED_CHANNEL_IDS

  messaging:
    session_prefix: sl
    max_chunk_size: 3000
